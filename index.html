<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
:root{color-scheme:dark}
body{background:#0f0f0f;color:#fff;height:100dvh;display:flex;flex-direction:column}
.header{background:#1a1a1a;padding:12px;border-bottom:1px solid #333}
.header h1{font-size:18px;text-align:center;margin-bottom:8px}
select{width:100%;background:#0f0f0f;color:#fff;border:1px solid #444;padding:10px;border-radius:8px;font-size:15px}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.7;word-wrap:break-word}
.user{align-self:flex-end;background:#2563eb;border-bottom-right-radius:4px}
.ai{align-self:flex-start;background:#262626;border-bottom-left-radius:4px;white-space:normal}
.input-bar{display:flex;gap:8px;padding:12px;background:#1a1a1a;border-top:1px solid #333}
#input{flex:1;background:#0f0f0f;border:1px solid #444;color:#fff;padding:14px;border-radius:24px;font-size:16px;outline:none}
#input:focus{border-color:#2563eb}
#send{background:#2563eb;border:none;color:#fff;width:50px;height:50px;border-radius:50%;font-size:22px;cursor:pointer}
#send:disabled{opacity:0.5}
.typing{opacity:0.7}
.section-title{font-size:12px;color:#888;margin-bottom:6px}
pre{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:0;margin:12px 0;position:relative;direction:ltr;text-align:left;overflow-x:auto}
.code-header{background:#1a1a1a;padding:8px 12px;font-size:12px;color:#888;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}
.copy-btn{background:#2563eb;border:none;color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer}
.copy-btn:active{background:#1d4ed8}
pre code{display:block;padding:12px;font-family:'Courier New',monospace;font-size:14px;white-space:pre;overflow-x:auto}
.ai p{margin:8px 0;white-space:pre-wrap}
.ai ul, .ai ol{margin:8px 0;padding-right:20px}
</style>
</head>
<body>
<div class="header">
  <h1>مساعد ذكي - 12 نموذج</h1>
  <select id="model">
    <optgroup label="🔴 سريع"><option value="google/gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option><option value="qwen/qwen3-32b">Qwen3 32B</option><option value="openai/gpt-5-mini">GPT-5 Mini</option></optgroup>
    <optgroup label="🔵 متوسط"><option value="qwen/qwen-coder-32b">Qwen Coder 32B</option><option value="deepseek/deepseek-chat">DeepSeek Chat</option><option value="grok/grok-4-fast">Grok 4 Fast</option></optgroup>
    <optgroup label="🟢 متقدم"><option value="perplexity">Perplexity</option><option value="claude">Claude</option><option value="openai">OpenAI</option><option value="deepseek">DeepSeek</option><option value="gemini">Gemini</option><option value="llama">Llama</option></optgroup>
  </select>
</div>
<div id="chat"></div>
<div class="input-bar"><input id="input" placeholder="اكتب رسالتك..." enterkeyhint="send"><button id="send">↑</button></div>
<script>
const chat = document.getElementById('chat'), input = document.getElementById('input'), sendBtn = document.getElementById('send'), modelSel = document.getElementById('model');
function renderMarkdown(text) {
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, l, c) => `<pre><div class="code-header"><span>${l || 'code'}</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div><code>${c.trim()}</code></pre>`);
  return text.replace(/\n/g, '<br>');
}
function copyCode(btn) { navigator.clipboard.writeText(btn.parentElement.nextElementSibling.textContent); btn.textContent = 'تم!'; setTimeout(() => btn.textContent = 'نسخ', 1500); }
async function send(){
  const text = input.value.trim(); if(!text) return; input.value = ''; sendBtn.disabled = true;
  chat.innerHTML += `<div class="msg user">${text}</div>`;
  const res = await fetch('/chat', {method: 'POST', body: JSON.stringify({model: modelSel.value, prompt: text})});
  const data = await res.json();
  chat.innerHTML += `<div class="msg ai">${renderMarkdown(data.reply)}</div>`;
  sendBtn.disabled = false;
}
sendBtn.onclick = send;
</script>
</body>
</html>
